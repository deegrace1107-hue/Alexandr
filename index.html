<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recicladora Alexander - Control de Compras</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #f0f8f0; padding: 12px; font-size: 14px; line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .logo-principal { display: block; max-width: 160px; margin: 16px auto; }
        h1 { font-size: 20px; text-align: center; color: #2e7d32; margin-bottom: 12px; font-weight: 700; }
        h2 { font-size: 17px; color: #2e7d32; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .section { margin: 16px; padding: 14px; border: 1px solid #c8e6c9; border-radius: 10px; background: #f8fff8; }
        .buscador { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; padding: 10px; background: #f1f8f9; border-radius: 8px; }
        .buscador input { flex: 1; min-width: 160px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 10px; }
        input, select, button { padding: 9px; border: 1px solid #bbb; border-radius: 6px; font-size: 14px; width: 100%; }
        button { background-color: #388e3c; color: #fff; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        button:hover { background-color: #2e7d32; }
        .btn-buscar { background-color: #1976d2; min-width: auto; padding: 9px 16px; }
        .btn-buscar:hover { background-color: #1565c0; }
        .btn-ver-todos { background-color: #ff9800; min-width: auto; padding: 9px 16px; }
        .btn-ver-todos:hover { background-color: #fb8c00; }
        .btn-quitar { background-color: #ef5350; min-width: auto; padding: 6px 10px; font-size: 12px; }
        .btn-quitar:hover { background-color: #e53935; }
        .btn-cliente { background-color: #43a047; padding: 7px 4px; font-size: 13px; min-width: 65px; margin: 2px; }
        .btn-cliente:hover { background-color: #388e3c; }
        .btn-ver-historial { background-color: #795548; color: #fff; font-weight: bold; border: none; padding: 10px 18px; border-radius: 8px; font-size: 15px; }
        .btn-ver-historial:hover { background-color: #5d4037; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; margin: 8px 0; border-radius: 6px; border: 1px solid #e0e0e0; }
        .table-wrap table { min-width: 600px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #e0e0e0; padding: 7px 5px; text-align: center; vertical-align: middle; }
        th { background-color: #e8f5e9; color: #1b5e20; font-weight: 600; }
        .fila-total-general { background-color: #e3f2fd; font-weight: 700; color: #0d47a1; font-size: 15px; padding: 12px; border-radius: 6px; margin-top: 10px; }
        .total { text-align: right; font-size: 16px; font-weight: 700; color: #1b5e20; margin: 10px 0; padding-right: 8px; }
        .aviso { background: #e3f2fd; padding: 8px; border-radius: 6px; margin-bottom: 10px; text-align: center; color: #0d47a1; font-size: 13px; font-weight: 500; }
        .tabla-resumen { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .tabla-resumen th, .tabla-resumen td { border: 1px solid #e0e0e0; padding: 6px 4px; text-align: center; }
        .tabla-resumen th { background: #e8f5e9; font-weight: 600; }
        .item-fecha { border: 1px solid #ffcc80; border-radius: 8px; margin-bottom: 10px; background: #fff; overflow: hidden; }
        .titulo-fecha { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #e65100; background: #fff3e0; }
        .flecha { font-size: 16px; }
        .contenido-fechas { max-height: 0; overflow: hidden; transition: max-height 0.3s; padding: 0 12px; }
        .contenido-fechas.abierto { max-height: 5000px; padding: 12px; }
        #ventanaFactura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: flex-start; padding: 16px; overflow-y: auto; }
        .caja-factura { background: white; width: 100%; max-width: 520px; padding: 24px; border-radius: 10px; position: relative; margin: 20px auto; }
        .btn-cerrar { position: absolute; top: 12px; right: 12px; font-size: 26px; border: none; background: none; cursor: pointer; color: #666; padding: 0; width: auto; }
        .logo-factura { display: block; max-width: 140px; margin: 0 auto 16px; }
        .tabla-factura { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px; }
        .tabla-factura th, .tabla-factura td { border: 1px solid #424242; padding: 9px 6px; text-align: right; }
        .tabla-factura th { text-align: left; background: #f5f5f5; }
        .total-final { font-size: 17px; font-weight: 700; color: #1b5e20; border-top: 2px solid #2e7d32; padding-top: 10px; margin-top: 10px; text-align: right; }
        .botones-factura { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .botones-factura button { flex: 1; min-width: 120px; }

        @media (max-width: 480px) {
            body { padding: 8px; font-size: 13px; }
            .section { margin: 10px; padding: 12px; }
            h1 { font-size: 18px; }
            h2 { font-size: 16px; }
            .grid { grid-template-columns: 1fr; }
            .buscador { flex-direction: column; align-items: stretch; }
            .buscador input { width: 100%; }
            .caja-factura { padding: 18px; margin: 10px auto; }
            .botones-factura { flex-direction: column; }
            .botones-factura button { width: 100%; }
        }

        @media print {
            body { background: white; padding: 0; font-size: 14px; }
            .container, .btn-cerrar, button, .aviso, .section:not(#ventanaFactura), .buscador { display: none !important; }
            #ventanaFactura { position: static; background: white; padding: 0; display: block !important; }
            .caja-factura { box-shadow: none; margin: 0; padding: 20px; max-width: 100%; }
            .tabla-factura { font-size: 15px; }
            .total-final { font-size: 18px; }
            @page { size: A4; margin: 1.5cm; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo Recicladora" class="logo-principal">
    <h1>♻️ Recicladora Alexander</h1>
    <div class="aviso" id="estadoConexion">✅ Listo para usar</div>

    <div class="section">
        <h2>⚙️ Configurar Materiales</h2>
        <div class="grid">
            <input type="text" id="nombreMaterial" placeholder="Nombre del material" required>
            <select id="unidadMedida">
                <option value="Libra">Libra</option>
                <option value="Kilo">Kilo</option>
            </select>
            <input type="number" step="0.01" id="precioUnitario" placeholder="Precio por unidad" required>
        </div>
        <button onclick="guardarMaterial()">Guardar Material</button>
    </div>

    <div class="section">
        <h2>📋 Materiales Guardados</h2>
        <div class="table-wrap">
            <table id="tablaMateriales">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Unidad</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaMateriales"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>🛒 Registrar Compra</h2>
        <div class="grid">
            <select id="materialSeleccionado"></select>
            <input type="number" step="0.1" id="pesoCantidad" placeholder="Peso / Cantidad" required>
        </div>
        <button onclick="agregarAlCarrito()">Agregar al listado</button>
    </div>

    <div class="section resumen">
        <h2>📝 Resumen de la Compra</h2>
        <div id="listadoCarrito">
            <p style="text-align:center; color:#666; padding:10px;">Agrega materiales para ver el resumen</p>
        </div>
        <div class="total" id="totalCompra">Total a Pagar: $0.00</div>
        <br>
        <button onclick="finalizarCompra()" style="font-size:16px; padding:12px;">✅ Guardar y Ver Recibo</button>
    </div>

    <div class="section totales-generales">
        <h2>📊 Totales y Reportes</h2>
        <div class="buscador">
            <input type="text" id="fechaBusqueda" placeholder="Buscar por fecha: dd/mm/aaaa">
            <button class="btn-buscar" onclick="buscarPorFecha()">🔍 Buscar</button>
            <button class="btn-ver-todos" id="btnVerTodosDias" onclick="alternarVerTodosDias()">📅 Ver Todos los Días</button>
        </div>
        <div id="contenedorTotalesDias"></div>
    </div>

    <div class="section historial">
        <h2>📜 Historial de Compras</h2>
        <div style="margin-bottom:12px;">
            <button class="btn-ver-historial" id="btnVerHistorialCompleto" onclick="alternarVerHistorial()">📋 Ver Historial Completo</button>
        </div>
        <div id="contenedorHistorial"></div>
    </div>
</div>

<div id="ventanaFactura">
    <div class="caja-factura">
        <button class="btn-cerrar" onclick="cerrarVentanaFactura()">×</button>
        <img src="logo.png" alt="Logo" class="logo-factura">
        <h2 style="text-align:center; margin-bottom:20px;">RECIBO DE COMPRA</h2>
        <div id="datosFactura"></div>
        <div class="botones-factura">
            <button onclick="window.print()">🖨️ Imprimir Recibo</button>
            <button class="btn-quitar" onclick="cerrarVentanaFactura()">Cerrar</button>
        </div>
    </div>
</div>

<script>
// === CONFIGURACIÓN DE SUPABASE ===
const SUPABASE_URL = "https://eqvyxdecgoroltpjuips.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdnl4ZGVjZ29yb2x0cGp1aXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDA4OTgsImV4cCI6MjA5ODYxNjg5OH0.lViGOOhJwRjF11ize_yNo8OtTOlo8bzXCtFZ13Ku4dE";
const supabase = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY) || null;

// === VARIABLES GLOBALES ===
let carrito = [];
let fechaHoy = new Date().toLocaleDateString('es-EC', { timeZone: 'America/Guayaquil' });
let verTodosDias = false;
let verTodoHistorial = false;
let listaMateriales = [];
let listaCompras = [];
let comprasPendientes = JSON.parse(localStorage.getItem('comprasPendientes')) || [];

// === FUNCIONES AUXILIARES ===
function normalizarHora(hora) {
    if (!hora || typeof hora !== 'string') return new Date().toLocaleTimeString('es-EC', { hour:'2-digit', minute:'2-digit', hour12:false });
    const partes = hora.split(':');
    return `${partes[0].padStart(2,'0')}:${partes[1].padStart(2,'0')}`;
}

function generarClaveUnica(compra) {
    return `${compra.fecha||''}-${normalizarHora(compra.hora||'')}-${compra.total||0}-${JSON.stringify(compra.detalles||[])}`;
}

// === INICIO: CARGA INMEDIATA DE TUS DATOS ===
document.addEventListener('DOMContentLoaded', () => {
    cargarMaterialesLocales();
    cargarComprasLocales();
    document.getElementById('estadoConexion').innerHTML = "✅ Listo para usar";
    if (supabase) sincronizarEnSegundoPlano();
});

// === CARGA DE DATOS LOCALES (SIEMPRE FUNCIONA) ===
function cargarMaterialesLocales() {
    const guardados = localStorage.getItem('materialesLocal');
    listaMateriales = guardados ? JSON.parse(guardados) : [];
    dibujarTablaMateriales();
    actualizarSelectMateriales();
}

function cargarComprasLocales() {
    const guardadas = localStorage.getItem('comprasGuardadas');
    listaCompras = guardadas ? JSON.parse(guardadas) : [];
    dibujarHistorial();
    dibujarTotales();
}

// === SINCRONIZACIÓN SIN DETENER NADA ===
async function sincronizarEnSegundoPlano() {
    try {
        // Sincronizar materiales
        const { data: matNube, error: errMat } = await supabase.from('materiales').select('*').order('nombre', {ascending:true});
        if (!errMat && matNube) {
            const mapa = new Map();
            matNube.forEach(m => mapa.set(m.nombre.toLowerCase(), m));
            listaMateriales.forEach(m => { if (!mapa.has(m.nombre.toLowerCase())) mapa.set(m.nombre.toLowerCase(), m); });
            listaMateriales = Array.from(mapa.values());
            localStorage.setItem('materialesLocal', JSON.stringify(listaMateriales));
            dibujarTablaMateriales();
            actualizarSelectMateriales();
        }

        // Sincronizar compras SIN DUPLICADOS
        const { data: comprasNube, error: errComp } = await supabase.from('compras').select('*').order('creado_en', {ascending:false});
        if (!errComp && comprasNube) {
            const clavesNube = new Set(comprasNube.map(c => generarClaveUnica(c)));
            const comprasValidas = listaCompras.filter(c => clavesNube.has(generarClaveUnica(c)));
            const todas = [...comprasNube, ...comprasValidas];
            const mapaFinal = new Map();
            todas.forEach(c => mapaFinal.set(generarClaveUnica(c), c));
            listaCompras = Array.from(mapaFinal.values());
            localStorage.setItem('comprasGuardadas', JSON.stringify(listaCompras));
            dibujarHistorial();
            dibujarTotales();
        }

        document.getElementById('estadoConexion').innerHTML = "✅ Conectado y sincronizado";
    } catch (err) {
        console.log("Sincronización en segundo plano:", err);
        document.getElementById('estadoConexion').innerHTML = "⚠️ Usando datos del celular";
    }
}

// === GESTIÓN DE MATERIALES ===
async function guardarMaterial() {
    const nombre = document.getElementById('nombreMaterial').value.trim();
    const unidad = document.getElementById('unidadMedida').value;
    const precio = parseFloat(document.getElementById('precioUnitario').value);
    
    if (!nombre || isNaN(precio) || precio <= 0) { alert('Completa todos los datos'); return; }
    if (listaMateriales.find(m => m.nombre.toLowerCase() === nombre.toLowerCase())) { alert('Este material ya existe'); return; }

    const nuevo = { nombre, unidad, precio_unitario: precio };
    try {
        if (supabase) {
            const { data, error } = await supabase.from('materiales').insert([nuevo]).select();
            if (!error) { listaMateriales.push(data[0]); alert('✅ Guardado en nube'); }
            else throw new Error("Sin conexión");
        } else throw new Error("Sin conexión");
    } catch {
        nuevo.id = Date.now();
        listaMateriales.push(nuevo);
        comprasPendientes.push({tipo:'material', datos:nuevo});
        localStorage.setItem('comprasPendientes', JSON.stringify(comprasPendientes));
        alert('✅ Guardado en celular, se subirá al tener internet');
    }

    localStorage.setItem('materialesLocal', JSON.stringify(listaMateriales));
    document.getElementById('nombreMaterial').value = '';
    document.getElementById('precioUnitario').value = '';
    dibujarTablaMateriales();
    actualizarSelectMateriales();
}

async function eliminarMaterial(id) {
    if (!confirm('¿Seguro quieres eliminar?')) return;
    try { if (supabase) await supabase.from('materiales').delete().eq('id', id); } catch {}
    listaMateriales = listaMateriales.filter(m => m.id !== id);
    localStorage.setItem('materialesLocal', JSON.stringify(listaMateriales));
    dibujarTablaMateriales();
    actualizarSelectMateriales();
}

function dibujarTablaMateriales() {
    const cuerpo = document.getElementById('cuerpoTablaMateriales');
    cuerpo.innerHTML = '';
    if (listaMateriales.length === 0) {
        cuerpo.innerHTML = '<tr><td colspan="4" style="color:#666;">Sin materiales registrados</td></tr>';
        return;
    }
    listaMateriales.forEach(m => {
        cuerpo.innerHTML += `
            <tr>
                <td>${m.nombre}</td>
                <td>${m.unidad}</td>
                <td>$${m.precio_unitario.toFixed(2)}</td>
                <td><button class="btn-quitar" onclick="eliminarMaterial(${m.id})">Eliminar</button></td>
            </tr>`;
    });
}

function actualizarSelectMateriales() {
    const select = document.getElementById('materialSeleccionado');
    select.innerHTML = '<option value="">Selecciona un material</option>';
    listaMateriales.forEach(m => {
        select.innerHTML += `<option value="${m.id}">${m.nombre} - $${m.precio_unitario.toFixed(2)}/${m.unidad}</option>`;
    });
}

// === GESTIÓN DEL CARRITO Y COMPRAS ===
function agregarAlCarrito() {
    const idMaterial = parseInt(document.getElementById('materialSeleccionado').value);
    const cantidad = parseFloat(document.getElementById('pesoCantidad').value);
    
    if (!idMaterial || isNaN(cantidad) || cantidad <= 0) { alert('Selecciona material y cantidad válida'); return; }
    const material = listaMateriales.find(m => m.id === idMaterial);
    const subtotal = material.precio_unitario * cantidad;

    carrito.push({
        id: Date.now(),
        material: material.nombre,
        unidad: material.unidad,
        precio: material.precio_unitario,
        cantidad: cantidad,
        subtotal: subtotal
    });

    document.getElementById('materialSeleccionado').value = '';
    document.getElementById('pesoCantidad').value = '';
    dibujarCarrito();
}

function dibujarCarrito() {
    const contenedor = document.getElementById('listadoCarrito');
    const totalElemento = document.getElementById('totalCompra');
    let totalGeneral = 0;

    if (carrito.length === 0) {
        contenedor.innerHTML = '<p style="text-align:center; color:#666; padding:10px;">Agrega materiales</p>';
        totalElemento.textContent = 'Total a Pagar: $0.00';
        return;
    }

    contenedor.innerHTML = '';
    carrito.forEach(item => {
        totalGeneral += item.subtotal;
        contenedor.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #ddd;">
                <span>${item.material} - ${item.cantidad.toFixed(1)} ${item.unidad}</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <span>$${item.subtotal.toFixed(2)}</span>
                    <button class="btn-quitar" style="padding:4px 8px; font-size:12px;" onclick="quitarItemCarrito(${item.id})">×</button>
                </div>
            </div>`;
    });

    totalElemento.textContent = `Total a Pagar: $${totalGeneral.toFixed(2)}`;
}

function quitarItemCarrito(id) {
    carrito = carrito.filter(item => item.id !== id);
    dibujarCarrito();
}

async function finalizarCompra() {
    if (carrito.length === 0) { alert('Agrega materiales primero'); return; }

    const totalCompra = carrito.reduce((sum, item) => sum + item.subtotal, 0);
    const fecha = new Date().toLocaleDateString('es-EC', { timeZone: 'America/Guayaquil' });
    const hora = normalizarHora(new Date().toLocaleTimeString('es-EC', { timeZone: 'America/Guayaquil', hour12:false }));

    const nuevaCompra = {
        fecha: fecha,
        hora: hora,
        total: totalCompra,
        detalles: carrito,
        creado_en: new Date().toISOString()
    };

    const clave = generarClaveUnica(nuevaCompra);
    if (listaCompras.some(c => generarClaveUnica(c) === clave)) { alert('⚠️ Esta compra ya existe'); return; }

    try {
        if (supabase) {
            const { data, error } = await supabase.from('compras').insert([nuevaCompra]).select();
            if (!error) { listaCompras.unshift(data[0]); alert('✅ Compra guardada'); }
            else throw new Error("Sin conexión");
        } else throw new Error("Sin conexión");
    } catch {
        nuevaCompra.id = Date.now();
        listaCompras.unshift(nuevaCompra);
        comprasPendientes.push({tipo:'compra', datos:nuevaCompra});
        localStorage.setItem('comprasPendientes', JSON.stringify(comprasPendientes));
        alert('✅ Guardada en celular, se sincronizará luego');
    }

    localStorage.setItem('comprasGuardadas', JSON.stringify(listaCompras));
    mostrarRecibo(nuevaCompra);
    carrito = [];
    dibujarCarrito();
    dibujarHistorial();
    dibujarTotales();
}

// === RECIBOS ===
function mostrarRecibo(compra) {
    let filas = '';
    compra.detalles.forEach(item => {
        filas += `
            <tr>
                <td>${item.material}</td>
                <td>${item.cantidad.toFixed(1)} ${item.unidad}</td>
                <td>$${item.precio.toFixed(2)}</td>
                <td>$${item.subtotal.toFixed(2)}</td>
            </tr>`;
    });

    document.getElementById('datosFactura').innerHTML = `
        <p style="text-align:center; margin-bottom:15px;">Fecha: ${compra.fecha} | Hora: ${compra.hora}</p>
        <table class="tabla-factura">
            <thead><tr><th>Material</th><th>Cantidad</th><th>Precio</th><th>Subtotal</th></tr></thead>
            <tbody>${filas}</tbody>
        </table>
        <div class="total-final">TOTAL: $${compra.total.toFixed(2)}</div>
        <p style="text-align:center; margin-top:20px; font-size:12px; color:#666;">Gracias por su preferencia</p>`;
    document.getElementById('ventanaFactura').style.display = 'flex';
}

function cerrarVentanaFactura() {
    document.getElementById('ventanaFactura').style.display = 'none';
}

// === VISTAS ===
function alternarVerTodosDias() {
    verTodosDias = !verTodosDias;
    document.getElementById('btnVerTodosDias').textContent = verTodosDias ? "📅 Ver Solo Hoy" : "📅 Ver Todos los Días";
    dibujarTotales();
}

function alternarVerHistorial() {
    verTodoHistorial = !verTodoHistorial;
    document.getElementById('btnVerHistorialCompleto').textContent = verTodoHistorial ? "📋 Ver Solo Hoy" : "📋 Ver Historial Completo";
    dibujarHistorial();
}

function buscarPorFecha() {
    const fechaBuscada = document.getElementById('fechaBusqueda').value.trim();
    dibujarHistorial(fechaBuscada ? listaCompras.filter(c => c.fecha === fechaBuscada) : null);
}

function dibujarHistorial(listaPersonalizada = null) {
    const contenedor = document.getElementById('contenedorHistorial');
    let comprasMostrar = listaPersonalizada || (verTodoHistorial ? listaCompras : listaCompras.filter(c => c.fecha === fechaHoy));
    
    if (comprasMostrar.length === 0) {
        contenedor.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Sin compras registradas</p>';
        return;
    }

    const agrupadas = {};
    comprasMostrar.forEach(c => { if (!agrupadas[c.fecha]) agrupadas[c.fecha] = []; agrupadas[c.fecha].push(c); });

    let html = '';
    Object.keys(agrupadas).forEach(fecha => {
        html += `
            <div class="item-fecha">
                <div class="titulo-fecha" onclick="this.nextElementSibling.classList.toggle('abierto'); this.querySelector('.flecha').textContent = this.nextElementSibling.classList.contains('abierto') ? '▲' : '▼'">
                    <span>📅 ${fecha} ${fecha === fechaHoy ? '(HOY)' : ''}</span>
                    <span class="flecha">▼</span>
                </div>
                <div class="contenido-fechas">
                    <table class="tabla-resumen">
                        <thead><tr><th>Hora</th><th>Total</th><th>Recibo</th></tr></thead>
                        <tbody>`;
        agrupadas[fecha].forEach(compra => {
            html += `
                <tr>
                    <td>${compra.hora}</td>
                    <td>$${compra.total.toFixed(2)}</td>
                    <td><button class="btn-cliente" onclick='mostrarRecibo(${JSON.stringify(compra).replace(/"/g, "&quot;")})'>Ver</button></td>
                </tr>`;
        });
        html += `</tbody></table></div></div>`;
    });

    contenedor.innerHTML = html;
}

function dibujarTotales() {
    const contenedor = document.getElementById('contenedorTotalesDias');
    let comprasMostrar = verTodosDias ? listaCompras : listaCompras.filter(c => c.fecha === fechaHoy);
    
    if (comprasMostrar.length === 0) {
        contenedor.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Sin datos para mostrar</p>';
        return;
    }

    const totales = {};
    let totalGeneral = 0;
    comprasMostrar.forEach(c => {
        if (!totales[c.fecha]) totales[c.fecha] = 0;
        totales[c.fecha] += c.total;
        totalGeneral += c.total;
    });

    let html = `<div class="fila-total-general">TOTAL GENERAL: $${totalGeneral.toFixed(2)}</div>`;
    Object.keys(totales).forEach(fecha => {
        html += `
            <div class="item-fecha" style="margin-top:12px;">
                <div class="titulo-fecha" onclick="this.nextElementSibling.classList.toggle('abierto'); this.querySelector('.flecha').textContent = this.nextElementSibling.classList.contains('abierto') ? '▲' : '▼'">
                    <span>📅 Día: ${fecha} ${fecha === fechaHoy ? '(HOY)' : ''}</span>
                    <span class="flecha">▼</span>
                </div>
                <div class="contenido-fechas">
                    <p style="font-size:15px; font-weight:600; color:#2e7d32; padding:8px 0;">Total del día: $${totales[fecha].toFixed(2)}</p>
                </div>
            </div>`;
    });

    contenedor.innerHTML = html;
}

// === SINCRONIZACIÓN AL RECUPERAR INTERNET ===
window.addEventListener('online', async () => {
    document.getElementById('estadoConexion').innerHTML = "✅ Conectado | Sincronizando...";
    if (supabase && comprasPendientes.length > 0) {
        for (const pendiente of comprasPendientes) {
            try {
                if (pendiente.tipo === 'material') await supabase.from('materiales').upsert([pendiente.datos]);
                if (pendiente.tipo === 'compra') {
                    const clave = generarClaveUnica(pendiente.datos);
                    const existe = listaCompras.some(c => generarClaveUnica(c) === clave);
                    if (!existe) await supabase.from('compras').insert([pendiente.datos]);
                }
            } catch {}
        }
        comprasPendientes = [];
        localStorage.setItem('comprasPendientes', JSON.stringify([]));
        await sincronizarEnSegundoPlano();
        alert('✅ Todos los datos sincronizados');
    }
});

window.addEventListener('offline', () => {
    document.getElementById('estadoConexion').innerHTML = "⚠️ Sin internet | Todo guardado en el celular";
});
</script>
