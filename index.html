<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recicladora Alexander</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f8f0; padding: 10px; font-size: 14px; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2e7d32; margin-bottom: 15px; }
        h2 { color: #2e7d32; margin: 15px 0 10px; font-size: 16px; border-bottom: 2px solid #c8e6c9; padding-bottom: 5px; }
        .section { margin-bottom: 20px; padding: 12px; border: 1px solid #c8e6c9; border-radius: 8px; }
        input, select, button { padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; width: 100%; }
        button { background: #388e3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2e7d32; }
        .btn-naranja { background: #ff9800; }
        .btn-azul { background: #1976d2; }
        .btn-rojo { background: #d32f2f; padding: 4px 8px; font-size: 12px; width: auto; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #e8f5e9; color: #1b5e20; font-weight: bold; }
        .total { font-size: 16px; font-weight: bold; color: #1b5e20; text-align: right; margin: 10px 0; padding: 8px; background: #f8fff8; border-radius: 5px; }
        .aviso { padding: 6px; border-radius: 5px; margin: 5px 0; text-align: center; font-size: 12px; }
        .aviso-verde { background: #e8f5e9; color: #1b5e20; }
        .aviso-azul { background: #e3f2fd; color: #0d47a1; }
        .aviso-naranja { background: #fff3e0; color: #e65100; }
        .item-fecha { border: 1px solid #ffcc80; border-radius: 6px; margin: 8px 0; background: #fffdf5; }
        .titulo-fecha { padding: 10px; background: #fff3e0; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; border-radius: 6px; }
        .contenido-fecha { padding: 10px; display: none; border-top: 1px solid #ffcc80; }
        .contenido-fecha.activo { display: block; }
        #ventanaFactura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; }
        .caja-factura { background: white; padding: 20px; border-radius: 10px; max-width: 500px; width: 100%; position: relative; }
        .cerrar { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #666; }
        .logo { display: block; max-width: 150px; margin: 0 auto 15px; }
        .tabla-factura { margin: 15px 0; }
        .total-final { font-size: 18px; font-weight: bold; color: #1b5e20; border-top: 2px solid #2e7d32; padding-top: 10px; text-align: right; }
        @media print {
            body, .cerrar, button, .aviso, .section { display: none !important; }
            #ventanaFactura { position: static; background: white; padding: 0; }
            .caja-factura { box-shadow: none; border-radius: 0; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <img src="logo.png" alt="Recicladora Alexander" class="logo">
    <h1>♻️ Recicladora Alexander</h1>
    <div class="aviso aviso-verde" id="estado">✅ Listo para trabajar | Conectando...</div>

    <div class="section">
        <h2>📦 Materiales Registrados</h2>
        <table id="tablaMateriales">
            <thead><tr><th>Material</th><th>Unidad</th><th>Precio</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoMat"></tbody>
        </table>
        <h3 style="margin:15px 0 8px; color:#2e7d32;">Agregar nuevo material</h3>
        <input type="text" id="nombreMat" placeholder="Nombre del material" required>
        <select id="unidadMat">
            <option value="Libra">Libra</option>
            <option value="Kilo">Kilo</option>
        </select>
        <input type="number" step="0.01" id="precioMat" placeholder="Precio por unidad">
        <button onclick="guardarMaterial()">Guardar Material</button>
    </div>

    <div class="section">
        <h2>🛒 Recibir Materiales</h2>
        <select id="selMaterial"></select>
        <input type="number" step="0.5" id="pesoRecibido" placeholder="Peso recibido">
        <button onclick="agregarCompra()">Agregar a la compra</button>
    </div>

    <div class="section">
        <h2>🧾 Resumen de Compra Actual</h2>
        <div id="listaCompra"><p style="text-align:center; color:#666;">Sin materiales agregados</p></div>
        <div class="total" id="totalCompra">Total: $0.00</div>
        <button onclick="guardarFactura()" style="font-size:15px; padding:10px;">📄 Guardar y Ver Factura</button>
    </div>

    <div class="section">
        <h2>📊 Totales Acumulados</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
            <input type="text" id="buscarFecha" placeholder="Buscar por fecha: dd/mm/aaaa" style="flex:1; min-width:150px;">
            <button class="btn-azul" onclick="buscarTotales()">🔍 Buscar</button>
            <button class="btn-naranja" onclick="verTodosTotales()">📋 Ver Todos</button>
        </div>
        <div id="listaTotales"></div>
    </div>

    <div class="section">
        <h2>📋 Historial de Facturas</h2>
        <div id="listaHistorial"></div>
    </div>
</div>

<div id="ventanaFactura">
    <div class="caja-factura">
        <span class="cerrar" onclick="cerrarFactura()">×</span>
        <div id="contenidoFactura"></div>
        <div style="margin-top: 20px; text-align: center; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
            <button onclick="window.print()">🖨️ Imprimir</button>
            <button class="btn-azul" onclick="verDetallada()">📋 Ver Detallada</button>
            <button class="btn-naranja" onclick="verCliente()">🧾 Recibo Cliente</button>
            <button class="btn-rojo" onclick="cerrarFactura()">Cerrar</button>
        </div>
    </div>
</div>

<script>
const URL_SUPABASE = "https://eqvyxdecgoroltpjuips.supabase.co";
const CLAVE_SUPABASE = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdnl4ZGVjZ29yb2x0cGp1aXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDA4OTgsImV4cCI6MjA5ODYxNjg5OH0.lViGOOhJwRjF11ize_yNo8OtTOlo8bzXCtFZ13Ku4dE";
const supabase = supabase.createClient(URL_SUPABASE, CLAVE_SUPABASE);

let carrito = [];
let facturaActual = null;
let colaPendientes = [];

// ✅ AL ABRIR: MUESTRA PRIMERO LO QUE TIENES YA GUARDADO, SIN ESPERAR
window.addEventListener('load', async () => {
    // CARGA Y MUESTRA DE INMEDIATO TUS DATOS LOCALES
    actualizarTodo();
    actualizarEstado();
    
    // LUEGO ACTUALIZA CON LO DE LA NUBE SIN TARDARTE
    setTimeout(() => sincronizarTodo(), 300);
    
    // CARGA LA COLA DE LO QUE FALTA SUBIR
    colaPendientes = JSON.parse(localStorage.getItem('colaPendientes')) || [];
});

function actualizarEstado() {
    const estado = document.getElementById('estado');
    if(navigator.onLine) estado.textContent = "✅ Conectado | Todos tus datos visibles";
    else estado.textContent = "✅ Sin internet | Trabajando normal, se sincronizará luego";
}

window.addEventListener('online', () => {
    actualizarEstado();
    subirPendientes();
    sincronizarTodo();
});
window.addEventListener('offline', actualizarEstado);

// ✅ SINCRONIZA NUBE Y CELULAR SIN BORRAR NI OCULTAR NADA
async function sincronizarTodo() {
    try {
        const { data: matNube } = await supabase.from('materiales').select('*');
        const { data: facNube } = await supabase.from('facturas').select('*').order('fecha_completa', {ascending:false});
        
        // JUNTA MATERIALES
        const matLocal = JSON.parse(localStorage.getItem('materiales')) || [];
        const mapaMat = new Map();
        matLocal.forEach(m => mapaMat.set(m.nombre, m));
        matNube?.forEach(m => mapaMat.set(m.nombre, m));
        const finalMat = Array.from(mapaMat.values());
        localStorage.setItem('materiales', JSON.stringify(finalMat));

        // JUNTA FACTURAS
        const facLocal = JSON.parse(localStorage.getItem('facturas')) || [];
        const mapaFac = new Map();
        facLocal.forEach(f => mapaFac.set(f.id_temp || f.id, f));
        facNube?.forEach(f => mapaFac.set(f.id || f.id_temp, f));
        const finalFac = Array.from(mapaFac.values());
        localStorage.setItem('facturas', JSON.stringify(finalFac));

        actualizarTodo();
    } catch (err) {
        console.log("Sincronización en segundo plano:", err);
    }
}

// ✅ MUESTRA TODO EN PANTALLA AL INSTANTE
function actualizarTodo() {
    const materiales = JSON.parse(localStorage.getItem('materiales')) || [];
    const facturas = JSON.parse(localStorage.getItem('facturas')) || [];
    actualizarMateriales(materiales);
    actualizarHistorial(facturas);
    actualizarTotales(facturas);
    actualizarCarrito();
}

// ✅ SUBIDA AUTOMÁTICA DE LO HECHO SIN INTERNET
async function subirPendientes() {
    if(!navigator.onLine || colaPendientes.length === 0) return;
    
    const exitosos = [];
    for(const item of colaPendientes) {
        try {
            if(item.tipo === 'material') await supabase.from('materiales').insert([item.datos]);
            if(item.tipo === 'factura') await supabase.from('facturas').insert([item.datos]);
            exitosos.push(item);
        } catch (e) { console.log("Falta subir luego:", e); }
    }
    colaPendientes = colaPendientes.filter(i => !exitosos.includes(i));
    localStorage.setItem('colaPendientes', JSON.stringify(colaPendientes));
    await sincronizarTodo();
}

// GESTIÓN DE MATERIALES
function guardarMaterial() {
    const nombre = document.getElementById('nombreMat').value.trim();
    const unidad = document.getElementById('unidadMat').value;
    const precio = parseFloat(document.getElementById('precioMat').value);
    if(!nombre || isNaN(precio) || precio <=0) return alert("Completa bien los datos");
    
    const materiales = JSON.parse(localStorage.getItem('materiales')) || [];
    if(materiales.some(m => m.nombre === nombre)) return alert("Ese material ya existe");
    
    const nuevo = { nombre, unidad, precio };
    materiales.push(nuevo);
    localStorage.setItem('materiales', JSON.stringify(materiales));
    actualizarMateriales(materiales);

    if(navigator.onLine) supabase.from('materiales').insert([nuevo]).catch(()=>{});
    else colaPendientes.push({tipo:'material', datos:nuevo});
    localStorage.setItem('colaPendientes', JSON.stringify(colaPendientes));
    
    document.getElementById('nombreMat').value = '';
    document.getElementById('precioMat').value = '';
}

function actualizarMateriales(materiales) {
    const cuerpo = document.getElementById('cuerpoMat');
    const select = document.getElementById('selMaterial');
    
    cuerpo.innerHTML = materiales.map(m => `<tr><td>${m.nombre}</td><td>${m.unidad}</td><td>$${m.precio.toFixed(2)}</td><td><button class="btn-rojo" onclick="eliminarMat('${m.nombre}')">Eliminar</button></td></tr>`).join('');
    select.innerHTML = materiales.map(m => `<option value="${m.nombre}">${m.nombre} - $${m.precio.toFixed(2)}/${m.unidad}</option>`).join('');
}

function eliminarMat(nombre) {
    if(!confirm(`¿Eliminar el material "${nombre}"?`)) return;
    const materiales = JSON.parse(localStorage.getItem('materiales')) || [];
    const nuevos = materiales.filter(m => m.nombre !== nombre);
    localStorage.setItem('materiales', JSON.stringify(nuevos));
    actualizarMateriales(nuevos);
    supabase.from('materiales').delete().eq('nombre', nombre).catch(()=>{});
}

// GESTIÓN DE COMPRAS
function agregarCompra() {
    const materiales = JSON.parse(localStorage.getItem('materiales')) || [];
    const nombre = document.getElementById('selMaterial').value;
    const peso = parseFloat(document.getElementById('pesoRecibido').value);
    const mat = materiales.find(m => m.nombre === nombre);
    if(!peso || !mat) return alert("Selecciona material y pon el peso");
    
    carrito.push({ nombre: mat.nombre, peso, unidad: mat.unidad, precio: mat.precio, total: peso * mat.precio });
    actualizarCarrito();
    document.getElementById('pesoRecibido').value = '';
}

function quitarItem(i) { carrito.splice(i,1); actualizarCarrito(); }

function actualizarCarrito() {
    const lista = document.getElementById('listaCompra');
    if(carrito.length ===0) lista.innerHTML = `<p style="text-align:center; color:#666;">Sin materiales agregados</p>`;
    else lista.innerHTML = `<table><tr><th>Material</th><th>Peso</th><th>Precio U.</th><th>Total</th><th>Quitar</th></tr>` +
        carrito.map((it,i) => `<tr><td>${it.nombre}</td><td>${it.peso} ${it.unidad}</td><td>$${it.precio.toFixed(2)}</td><td>$${it.total.toFixed(2)}</td><td><button class="btn-rojo" onclick="quitarItem(${i})">❌</button></td></tr>`).join('') + `</table>`;
    const total = carrito.reduce((s,i)=>s+i.total,0);
    document.getElementById('totalCompra').textContent = `Total: $${total.toFixed(2)}`;
}

// GUARDAR FACTURA
async function guardarFactura() {
    if(carrito.length ===0) return alert("Agrega materiales primero");
    
    const total = carrito.reduce((s,i)=>s+i.total,0);
    const fechaCompleta = new Date().toLocaleString('es-EC', {dateStyle:'short', timeStyle:'short'});
    const idTemp = 'FACT-' + Date.now();
    
    facturaActual = { id_temp:idTemp, fecha_completa:fechaCompleta, total:total, detalles:[...carrito] };
    
    const facturas = JSON.parse(localStorage.getItem('facturas')) || [];
    facturas.unshift(facturaActual);
    localStorage.setItem('facturas', JSON.stringify(facturas));
    actualizarHistorial(facturas);
    actualizarTotales(facturas);

    if(navigator.onLine) supabase.from('facturas').insert([facturaActual]).catch(()=>{});
    else colaPendientes.push({tipo:'factura', datos:facturaActual});
    localStorage.setItem('colaPendientes', JSON.stringify(colaPendientes));

    verCliente();
    document.getElementById('ventanaFactura').style.display = 'flex';
    carrito = []; actualizarCarrito();
}

// VISTAS DE FACTURAS
function verCliente() {
    if(!facturaActual) return;
    const agrupado = {};
    facturaActual.detalles.forEach(i => {
        if(!agrupado[i.nombre]) agrupado[i.nombre] = {peso:0, unidad:i.unidad, precio:i.precio, total:0};
        agrupado[i.nombre].peso += i.peso;
        agrupado[i.nombre].total += i.total;
    });
    document.getElementById('contenidoFactura').innerHTML = `
        <img src="logo.png" alt="Recicladora Alexander" class="logo">
        <h2 style="text-align:center;">RECIBO DE PAGO</h2>
        <hr style="border:1px dashed #ccc; margin:10px 0;">
        <p><strong>Fecha y Hora:</strong> ${facturaActual.fecha_completa}</p>
        <p><strong>Recicladora Alexander</strong></p>
        <p>Portoviejo - Manabí - Ecuador</p>
        <hr style="border:1px dashed #ccc; margin:10px 0;">
        <table><tr><th>Material</th><th>Peso Total</th><th>Precio U.</th><th>Total</th></tr>
        ${Object.values(agrupado).map(i=>`<tr><td>${i.nombre}</td><td>${i.peso.toFixed(1)} ${i.unidad}</td><td>$${i.precio.toFixed(2)}</td><td>$${i.total.toFixed(2)}</td></tr>`).join('')}
        </table>
        <div class="total-final">Total: $${facturaActual.total.toFixed(2)}</div>
    `;
}

function verDetallada() {
    if(!facturaActual) return;
    document.getElementById('contenidoFactura').innerHTML = `
        <img src="logo.png" alt="Recicladora Alexander" class="logo">
        <h2 style="text-align:center;">FACTURA DETALLADA</h2>
        <hr style="border:1px dashed #ccc; margin:10px 0;">
        <p><strong>Fecha y Hora:</strong> ${facturaActual.fecha_completa}</p>
        <hr style="border:1px dashed #ccc; margin:10px 0;">
        <table><tr><th>Material</th><th>Peso por pesada</th><th>Precio U.</th><th>Subtotal</th></tr>
        ${facturaActual.detalles.map(i=>`<tr><td>${i.nombre}</td><td>${i.peso} ${i.unidad}</td><td>$${i.precio.toFixed(2)}</td><td>$${i.total.toFixed(2)}</td></tr>`).join('')}
        </table>
        <div class="total-final">Total: $${facturaActual.total.toFixed(2)}</div>
    `;
}

function cerrarFactura() { document.getElementById('ventanaFactura').style.display = 'none'; facturaActual = null; }

// HISTORIAL Y TOTALES
function actualizarHistorial(facturas) {
    const lista = document.getElementById('listaHistorial');
    if(facturas.length ===0) { lista.innerHTML = `<p style="text-align:center; color:#666;">Sin facturas guardadas</p>`; return; }
    
    const agrupado = {};
    facturas.forEach(f => {
        const fecha = f.fecha_completa.split(' ')[0];
        if(!agrupado[fecha]) agrupado[fecha] = [];
        agrupado[fecha].push(f);
    });
    
    lista.innerHTML = Object.entries(agrupado).map(([fecha, facs]) => `
        <div class="item-fecha">
            <div class="titulo-fecha" onclick="this.nextElementSibling.classList.toggle('activo')">📅 ${fecha} <span>▼</span></div>
            <div class="contenido-fecha">
                <table><tr><th>Hora</th><th>Total</th><th>Ver</th></tr>
                ${facs.map(f=>`<tr><td>${f.fecha_completa.split(' ')[1]}</td><td>$${f.total.toFixed(2)}</td><td><button class="btn-azul" onclick="verFactura(${JSON.stringify(f).replace(/'/g, '&#39;')})">Ver</button></td></tr>`).join('')}
                </table>
            </div>
        </div>
    `).join('');
}

function verFactura(f) { facturaActual = f; verCliente(); document.getElementById('ventanaFactura').style.display = 'flex'; }

function actualizarTotales(facturas) {
    const lista = document.getElementById('listaTotales');
    const totales = {};
    facturas.forEach(f => {
        const fecha = f.fecha_completa.split(' ')[0];
        if(!totales[fecha]) totales[fecha] = {};
        f.detalles.forEach(i => {
            if(!totales[fecha][i.nombre]) totales[fecha][i.nombre] = {peso:0, unidad:i.unidad, monto:0};
            totales[fecha][i.nombre].peso += i.peso;
            totales[fecha][i.nombre].monto += i.total;
        });
    });
    
    let html = '';
    let totalGral = 0;
    Object.entries(totales).sort((a,b) => new Date(b[0].split('/').reverse().join('-')) - new Date(a[0].split('/').reverse().join('-'))).forEach(([fecha, mat]) => {
        const totalDia = Object.values(mat).reduce((s,m)=>s+m.monto,0);
        totalGral += totalDia;
        html += `<div class="item-fecha"><div class="titulo-fecha" onclick="this.nextElementSibling.classList.toggle('activo')">📅 ${fecha} - Total día: $${totalDia.toFixed(2)} <span>▼</span></div><div class="contenido-fecha"><table><tr><th>Material</th><th>Peso Total</th><th>Monto</th></tr>` +
        Object.entries(mat).map(([n,m])=>`<tr><td>${n}</td><td>${m.peso.toFixed(1)} ${m.unidad}</td><td>$${m.monto.toFixed(2)}</td></tr>`).join('') + `</table></div></div>`;
    });
    html += `<div class="total">💰 TOTAL GENERAL: $${totalGral.toFixed(2)}</div>`;
    lista.innerHTML = html;
}

function buscarTotales() {
    const fecha = document.getElementById('buscarFecha').value.trim();
    const todas = JSON.parse(localStorage.getItem('facturas')) || [];
    const filtradas = todas.filter(f => f.fecha_completa.split(' ')[0] === fecha);
    actualizarHistorial(filtradas);
    actualizarTotales(filtradas);
}

function verTodosTotales() {
    const todas = JSON.parse(localStorage.getItem('facturas')) || [];
    actualizarHistorial(todas);
    actualizarTotales(todas);
}
</script>
</body>
</html>
